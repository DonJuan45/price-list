name: Collect Price Data

on:
  schedule:
    # Run daily at 04:00 Turkey time (01:00 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  # Everything except Fiat runs on GitHub's cloud runners.
  collect-others:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data collector (all brands except Fiat)
        run: npx tsx scripts/collect.ts
        env:
          COLLECT_EXCLUDE: fiat
          PUSER: ${{ secrets.PUSER }}
          PPASS: ${{ secrets.PPASS }}

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: collect price data (others) for $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

  # Fiat blocks cloud IPs, so it runs on the self-hosted runner (residential IP).
  # Runs after collect-others so it can rebase onto that commit before pushing.
  collect-fiat:
    needs: collect-others
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get latest data from collect-others
        run: git pull --rebase origin main

      - name: Run data collector (Fiat only)
        run: npx tsx scripts/collect.ts
        env:
          COLLECT_BRANDS: fiat
          PUSER: ${{ secrets.PUSER }}
          PPASS: ${{ secrets.PPASS }}

      - name: Generate artifacts
        run: npx tsx scripts/generateArtifacts.ts
        env:
          PUSER: ${{ secrets.PUSER }}
          PPASS: ${{ secrets.PPASS }}

      - name: Run health check
        run: npx tsx scripts/healthCheck.ts
        env:
          PUSER: ${{ secrets.PUSER }}
          PPASS: ${{ secrets.PPASS }}

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: collect price data (fiat) for $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
